name: Update Profile Stats

on:
  schedule:
    # Run daily at midnight UTC
    - cron: '0 0 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

# Serialize runs so two Action invocations never overlap and race each other.
concurrency:
  group: update-stats
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # full history so the sync merge can always find a merge-base

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Generate SVGs
        env:
          # Use PAT for full repo access (including private repos)
          # Create at: Settings > Developer settings > Personal access tokens
          # Required scopes: repo, read:user
          GH_TOKEN: ${{ secrets.ACCESS_TOKEN }}
        run: |
          python generate_svg.py

      - name: Commit and push
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git config core.autocrlf false
          git add dark_mode.svg light_mode.svg cache/
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Update profile stats"
          # Shared robust sync (scripts/lib-git-sync.sh): self-heal any stranded state,
          # then merge + push with retry. -X theirs => defer to origin, since the local
          # writers carry the real Claude token count this runner cannot compute and the
          # Action must never regress it with stale cache-derived values.
          . scripts/lib-git-sync.sh
          git_selfheal
          git_sync_push theirs main
